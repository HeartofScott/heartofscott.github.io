<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<rect width="400" height="400" fill="#0d4f6e"/>
<rect x="0" y="0" width="400" height="6" fill="#c07010"/>
<text x="200" y="135" font-family="Georgia,serif" font-size="110" font-weight="bold" fill="white" text-anchor="middle">928</text>
<text x="200" y="168" font-family="Georgia,serif" font-size="20" fill="rgba(255,255,255,0.65)" text-anchor="middle" font-style="italic">million litres of water</text>
<line x1="40" y1="188" x2="360" y2="188" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
<text x="200" y="218" font-family="Georgia,serif" font-size="17" fill="rgba(255,255,255,0.8)" text-anchor="middle">One data centre.</text>
<text x="200" y="242" font-family="Georgia,serif" font-size="17" fill="rgba(255,255,255,0.8)" text-anchor="middle">One year.</text>
<text x="200" y="270" font-family="Georgia,serif" font-size="17" fill="white" text-anchor="middle" font-weight="bold">Nobody required it to say so.</text>
