<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#3a2c1c"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="400" height="6" fill="#d4881c"/>
  <!-- Big number -->
  <text x="200" y="148" font-family="Georgia,serif" font-size="130" font-weight="bold" fill="#d4881c" text-anchor="middle" letter-spacing="-4">50</text>
  <!-- Unit -->
  <text x="200" y="182" font-family="Georgia,serif" font-size="22" fill="rgba(247,242,232,0.55)" text-anchor="middle" font-style="italic">gigawatts</text>
  <!-- Divider -->
  <line x1="50" y1="202" x2="350" y2="202" stroke="rgba(247,242,232,0.12)" stroke-width="1"/>
  <!-- Context lines -->
  <text x="200" y="234" font-family="Georgia,serif" font-size="18" fill="rgba(247,242,232,0.85)" text-anchor="middle">Queued to the British grid.</text>
  <text x="200" y="260" font-family="Georgia,serif" font-size="18" fill="rgba(247,242,232,0.85)" text-anchor="middle">Three times the country's</text>
  <text x="200" y="286" font-family="Georgia,serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">entire peak electricity demand.</text>
  <!-- Bottom band -->
  <rect x="0" y="328" width="400" height="72" fill="rgba(0,0,0,0.4)"/>
  <text x="200" y="354" font-family="Georgia,serif" font-size="11" fill="rgba(247,242,232,0.32)" text-anchor="middle" letter-spacing="3">THE FIREWALKERS · PR-001</text>
  <text x="200" y="378" font-family="Georgia,serif" font-size="14" fill="#d4881c" text-anchor="middle">firewalkers.earth</text>
</svg>
