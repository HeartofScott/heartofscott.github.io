<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - parchment warm -->
  <rect width="400" height="400" fill="#f4ebda"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="400" fill="#9c5500"/>
  <!-- Big 12 wks -->
  <text x="200" y="110" font-family="Georgia,serif" font-size="90" font-weight="bold" fill="#9c5500" text-anchor="middle" letter-spacing="-2">12</text>
  <text x="200" y="148" font-family="Georgia,serif" font-size="24" fill="#3d2e1e" text-anchor="middle" font-style="italic">weeks</text>
  <!-- Divider -->
  <line x1="40" y1="168" x2="360" y2="168" stroke="rgba(160,88,0,0.2)" stroke-width="1"/>
  <!-- Description -->
  <text x="200" y="202" font-family="Georgia,serif" font-size="17" fill="#3d2e1e" text-anchor="middle">That is how long most communities</text>
  <text x="200" y="226" font-family="Georgia,serif" font-size="17" fill="#3d2e1e" text-anchor="middle">have to object to a data centre</text>
  <text x="200" y="250" font-family="Georgia,serif" font-size="17" fill="#3d2e1e" text-anchor="middle">planning application.</text>
  <!-- Emphasis line -->
  <text x="200" y="284" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#7a1a0a" text-anchor="middle">Most don't know the clock</text>
  <text x="200" y="308" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#7a1a0a" text-anchor="middle">is running at all.</text>
  <!-- Divider -->
  <line x1="40" y1="328" x2="360" y2="328" stroke="rgba(160,88,0,0.2)" stroke-width="1"/>
  <!-- Footer -->
  <text x="200" y="354" font-family="Georgia,serif" font-size="11" fill="#7a7262" text-anchor="middle" letter-spacing="2">THE FIREWALKERS</text>
  <text x="200" y="376" font-family="Georgia,serif" font-size="13" fill="#9c5500" text-anchor="middle">firewalkers.earth</text>
</svg>
