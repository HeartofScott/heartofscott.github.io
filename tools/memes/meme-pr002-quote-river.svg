<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<rect width="400" height="400" fill="#221811"/>
<rect x="0" y="0" width="6" height="400" fill="#c07010"/>
<text x="36" y="90" font-family="Georgia,serif" font-size="80" fill="rgba(192,112,16,0.2)">"</text>
<text x="40" y="145" font-family="Georgia,serif" font-size="19" fill="white" font-style="italic">The planning system</text>
<text x="40" y="172" font-family="Georgia,serif" font-size="19" fill="white" font-style="italic">asks: is this site</text>
<text x="40" y="199" font-family="Georgia,serif" font-size="19" fill="white" font-style="italic">permissible?</text>
<text x="40" y="235" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">It never asks: what</text>
<text x="40" y="260" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">happens to this river</text>
<text x="40" y="285" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">in a drought year?</text>
<line x1="40" y1="308" x2="200" y2="308" stroke="rgba(192,112,16,0.4)" stroke-width="1"/>
<text x="40" y="330" font-family="Georgia,serif" font-size="12" fill="rgba(255,255,255,0.38)" letter-spacing="2">SCOTT SEIVWRIGHT</text>
<text x="40" y="350" font-family="Georgia,serif" font-size="11" fill="#c07010" letter-spacing="1">THE FIREWALKERS</text>
<text x="360" y="388" font-family="Georgia,serif" font-size="11" fill="rgba(192,112,16,0.5)" text-anchor="end">firewalkers.earth</text>
</svg>
