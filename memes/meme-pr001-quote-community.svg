<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#1e1610"/>
  <!-- Amber left bar -->
  <rect x="0" y="0" width="6" height="400" fill="#9c5500"/>
  <!-- Large decorative quote mark -->
  <text x="36" y="96" font-family="Georgia,serif" font-size="90" fill="rgba(156,85,0,0.18)">"</text>
  <!-- Quote lines -->
  <text x="40" y="148" font-family="Georgia,serif" font-size="20" fill="white" font-style="italic">Communities deserve</text>
  <text x="40" y="175" font-family="Georgia,serif" font-size="20" fill="white" font-style="italic">better than a 12-week</text>
  <text x="40" y="202" font-family="Georgia,serif" font-size="20" fill="white" font-style="italic">window on decisions</text>
  <text x="40" y="238" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">that will affect their land,</text>
  <text x="40" y="263" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">their water and their grid</text>
  <text x="40" y="288" font-family="Georgia,serif" font-size="18" fill="rgba(255,255,255,0.72)" font-style="italic">for decades.</text>
  <!-- Divider -->
  <line x1="40" y1="312" x2="220" y2="312" stroke="rgba(156,85,0,0.45)" stroke-width="1"/>
  <!-- Attribution -->
  <text x="40" y="334" font-family="Georgia,serif" font-size="12" fill="rgba(255,255,255,0.38)" letter-spacing="2">SCOTT SEIVWRIGHT</text>
  <text x="40" y="353" font-family="Georgia,serif" font-size="11" fill="#9c5500" letter-spacing="1">THE FIREWALKERS · PR-001</text>
  <!-- URL -->
  <text x="360" y="388" font-family="Georgia,serif" font-size="11" fill="rgba(156,85,0,0.5)" text-anchor="end">firewalkers.earth</text>
</svg>
