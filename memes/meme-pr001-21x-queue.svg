<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f7f2e8"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="400" height="6" fill="#7a1a0a"/>
  <!-- Eyebrow -->
  <text x="200" y="46" font-family="Georgia,serif" font-size="12" fill="#7a7262" text-anchor="middle" letter-spacing="3">BRITAIN'S DATA CENTRE QUEUE</text>

  <!-- Queue bar label -->
  <text x="20" y="82" font-family="Georgia,serif" font-size="12" fill="#7a7262" letter-spacing="1">QUEUED</text>
  <!-- Queue bar - full width, urgent red -->
  <rect x="20" y="90" width="360" height="36" fill="#7a1a0a"/>
  <text x="30" y="114" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white">50 GW</text>

  <!-- Need bar label -->
  <text x="20" y="152" font-family="Georgia,serif" font-size="12" fill="#7a7262" letter-spacing="1">ACTUALLY NEEDED BY 2050</text>
  <!-- Need bar - proportional: 14.6/50 = 29% -->
  <rect x="20" y="160" width="360" height="36" fill="#e8dcc8"/>
  <rect x="20" y="160" width="105" height="36" fill="#2d5a38"/>
  <text x="30" y="184" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white">14.6 GW</text>

  <!-- Connected today bar label -->
  <text x="20" y="222" font-family="Georgia,serif" font-size="12" fill="#7a7262" letter-spacing="1">CONNECTED TODAY</text>
  <!-- Connected bar - 2.4/50 = 4.8% -->
  <rect x="20" y="230" width="360" height="36" fill="#e8dcc8"/>
  <rect x="20" y="230" width="17" height="36" fill="#3a4f5c"/>
  <text x="44" y="254" font-family="Georgia,serif" font-size="14" fill="#3a4f5c">2.4 GW</text>

  <!-- Divider -->
  <line x1="20" y1="285" x2="380" y2="285" stroke="#d6c8b0" stroke-width="1"/>

  <!-- Conclusion -->
  <text x="200" y="316" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#1e1610" text-anchor="middle">The queue is 21× what is built.</text>
  <text x="200" y="342" font-family="Georgia,serif" font-size="15" fill="#3d2e1e" text-anchor="middle" font-style="italic">Source: Ofgem &amp; NESO Future Energy Scenarios 2025</text>

  <text x="200" y="382" font-family="Georgia,serif" font-size="13" fill="#9c5500" text-anchor="middle">firewalkers.earth</text>
</svg>
